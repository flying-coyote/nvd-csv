name: Daily CVE refresh

on:
  schedule:
    # 07:00 UTC — comfortably after the upstream midnight-UTC baseline release.
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Build mode (auto decides full vs delta from the deltaLog window)"
        type: choice
        options: [auto, full, delta]
        default: auto

permissions:
  contents: write

# Never let two refreshes run at once; queue, don't cancel a run mid-commit.
concurrency:
  group: cve-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # generous: a FULL rebuild clones + reparses every record
    steps:
      - name: Checkout (this repo, incl. committed data)
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build / refresh dataset
        env:
          MODE: ${{ github.event.inputs.mode || 'auto' }}
        run: python -m src.build --mode "$MODE"

      - name: Commit & push if anything changed
        env:
          MODE: ${{ github.event.inputs.mode || 'auto' }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "$(git status --porcelain data/ README.md)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/ README.md
            git commit -m "chore: daily CVE refresh $(date -u +%F) [$MODE]"
            # serialize-safe: concurrency guards overlap, but rebase on remote just in
            # case. A failed rebase must abort the step (errexit) — never push stale data.
            git pull --rebase --autostash origin "$REF_NAME"
            git push
          else
            echo "No changes to commit."
          fi
